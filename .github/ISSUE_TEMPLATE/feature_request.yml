name: Feature Request
description: 提交新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议。请尽量给出清晰的场景、边界与兼容性影响，便于评估。

  - type: textarea
    id: background
    attributes:
      label: 背景与动机
      description: 你遇到的实际问题是什么？为什么需要这个能力？
      placeholder: 当前痛点、业务场景、频率/规模
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 你期望的 API/行为（可附伪代码）
      placeholder: |
        - API:
        - 行为:
        - 示例:
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你尝试过的替代方案及其不足
      placeholder: 例如已有能力无法满足的原因

  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性影响
      description: 对现有 API/行为是否有破坏性变化
      placeholder: 向后兼容 / 需要迁移 / 风险点
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 issue，确认不是重复建议
          required: true
        - label: 我理解并同意按仓库当前许可与贡献条款提交内容
          required: true
