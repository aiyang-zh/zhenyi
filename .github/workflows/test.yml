name: Run Tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Verify gofmt
        run: |
          test -z "$(gofmt -l .)"

      # 无 etcd 的 runner：跳过 zdiscovery 的 etcd 集成测（与本地有 etcd 时仍可 go test ./... 跑通不同）
      - name: Run tests
        run: go test ./... -race -count=3 -skip '^TestIntegration_'

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run fuzz tests
        env:
          FUZZTIME: 5s
        run: bash ./scripts/run_fuzz_all.sh

      - name: Upload failing inputs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: zhenyi-failing-inputs
          path: |
            **/testdata/fuzz/**
          if-no-files-found: ignore
