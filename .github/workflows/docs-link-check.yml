name: Docs Link Check

# 仅在 Markdown 或链接检查脚本变更时运行（纯代码提交不跑）
on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "scripts/docs-check.py"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "scripts/docs-check.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check relative links (same as make docs-check)
        run: python3 ./scripts/docs-check.py
